<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>모리메이커 · 의전 운영 콘솔</title>
  <link rel="stylesheet" href="/fonts/pretendard/pretendardvariable-dynamic-subset.css">
  <style>
    /* Bodoni Moda — OFL, @fontsource-variable 실물 복사(자가호스팅). family명은 디자인 토큰 --serif 첫
       엔트리와 verbatim 일치시켜 재등록(원본 패키지 명칭 'Bodoni Moda Variable'을 그대로 쓰면 스택 미매칭) */
    @font-face{
      font-family:"Bodoni Moda";
      src:url(/fonts/bodoni-moda/bodoni-moda-latin-wght-normal.woff2) format("woff2-variations");
      font-style:normal; font-display:swap; font-weight:400 900;
      unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
    }
    @font-face{
      font-family:"Bodoni Moda";
      src:url(/fonts/bodoni-moda/bodoni-moda-latin-ext-wght-normal.woff2) format("woff2-variations");
      font-style:normal; font-display:swap; font-weight:400 900;
      unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;
    }
    :root{
      /* 다크 시그니처 SSOT 값 전사(로컬 토큰 정의점 — auth는 별개 앱이라 tokens.css를 import하지 않고
         값을 리터럴로 보유한다. 이름·값은 ui-kit/tokens.css 정본과 동일하게 유지) */
      --void:#08090C; --surface:#101318; --card:#161A21;
      --champagne:#D4B36A; --champagne-hi:#F0DCA8; --champagne-lo:#9C7C3C;
      --btn-ink:#14100A; /* 골드 CTA 위 전용 잉크 — 페이지 배경(void)과 다른 값이라 구분 유지 */
      --ivory:#EDE9E0; --muted:#8B8E96; --danger:#C96A5E;
      --line:rgba(212,179,106,.28); /* 금선 hairline — 카드 프레임 */
      --radius-frame:4px; --radius-sharp:2px;
      --serif:"Bodoni Moda","Bodoni 72",Didot,"Times New Roman",serif;
      --sans:"Pretendard Variable",Pretendard,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; min-height:100vh; font-family:var(--sans); color:var(--ivory);
      background:
        radial-gradient(120% 90% at 50% -10%, var(--surface) 0%, var(--void) 60%);
      display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .card{
      width:100%; max-width:400px; background:var(--card);
      border:1px solid var(--line); border-radius:var(--radius-frame);
      padding:40px 34px 30px; position:relative; overflow:hidden;
      box-shadow:0 24px 60px -30px rgba(0,0,0,.8);
      animation:rise .4s ease both;
    }
    /* 상단 금박 meridian 밴드 — 시그니처 */
    .card::before{
      content:""; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,var(--champagne) 20%,var(--champagne) 80%,transparent);
    }
    @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
    .brand{text-align:center; margin-bottom:26px;}
    .seal{width:46px; height:46px; margin:0 auto 14px; display:block;}
    .seal-outer{stroke:var(--champagne);}
    .seal-inner{stroke:var(--champagne-lo);}
    .seal-mark{fill:var(--champagne);}
    .wordmark{
      font-family:var(--serif); font-size:24px; letter-spacing:.22em;
      text-transform:uppercase; color:var(--ivory); margin:0 0 6px;
    }
    .subtitle{font-size:12px; letter-spacing:.28em; color:var(--muted); text-transform:none;}
    /* 상태 스트립 */
    .notice{
      font-size:13px; padding:10px 12px; border-radius:var(--radius-sharp); margin-bottom:20px;
      border:1px solid transparent;
    }
    .notice--error{color:var(--danger); border-color:rgba(201,106,94,.4); background:rgba(201,106,94,.07);}
    .notice--info{color:var(--muted); border-color:rgba(139,147,160,.3); background:rgba(139,147,160,.06);}
    .field{margin-bottom:18px;}
    label{
      display:block; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
      color:var(--muted); margin-bottom:7px;
    }
    input{
      width:100%; background:transparent; border:0; border-bottom:1.5px solid var(--champagne-lo);
      color:var(--ivory); font-size:15px; padding:8px 2px; font-family:var(--sans);
      transition:border-color .2s;
    }
    input:focus{outline:none; border-bottom-color:var(--champagne);}
    input:focus-visible{box-shadow:0 2px 0 -1px var(--champagne);}
    button{
      width:100%; margin-top:10px; padding:13px; border:0; border-radius:var(--radius-sharp);
      background:var(--champagne); color:var(--btn-ink); font-size:14px; font-weight:600;
      letter-spacing:.12em; cursor:pointer; font-family:var(--sans);
      transition:transform .12s, background .2s;
    }
    button:hover{background:var(--champagne-hi); transform:translateY(-1px);}
    button:focus-visible{outline:2px solid var(--ivory); outline-offset:2px;}
    .foot{margin-top:22px; text-align:center; font-size:11px; letter-spacing:.06em; color:var(--champagne-lo);}
    @media (max-width:420px){ .card{padding:32px 22px 26px;} .wordmark{font-size:21px;} }
    @media (prefers-reduced-motion:reduce){ .card{animation:none;} button,input{transition:none;} }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <!-- 모노그램 왁스씰(시그니처) — 인라인 SVG(외부 요청 0). 실 로고 확보 시 교체 -->
      <svg class="seal" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <circle class="seal-outer" cx="24" cy="24" r="22" stroke-width="1.3"/>
        <circle class="seal-inner" cx="24" cy="24" r="17" stroke-width=".8"/>
        <text class="seal-mark" x="24" y="31" text-anchor="middle" font-family="Georgia,serif"
              font-size="20" letter-spacing="0">M</text>
      </svg>
      <h1 class="wordmark">Morymaker</h1>
      <p class="subtitle">의전 운영 콘솔</p>
    </div>

    <!-- 인증 실패: 사용자 열거 방지 위해 원인 미노출(이메일/비밀번호 어느 쪽인지 특정 안 함) -->
    <div class="notice notice--error" role="alert" th:if="${param.error != null}">
      이메일 또는 비밀번호가 올바르지 않습니다.
    </div>
    <!-- 로그아웃 완료 -->
    <div class="notice notice--info" th:if="${param.logout != null}">
      로그아웃되었습니다.
    </div>

    <!-- th:action이 CSRF 히든 필드 자동 주입.
         (명시 fallback: <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>) -->
    <form method="post" th:action="@{/login}">
      <div class="field">
        <label for="username">이메일</label>
        <input id="username" name="username" type="email"
               autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password"
               autocomplete="current-password" required>
      </div>
      <button type="submit">로그인</button>
    </form>

    <p class="foot">모리메이커 의전 운영 · 관계자 전용</p>
  </main>
</body>
</html>
